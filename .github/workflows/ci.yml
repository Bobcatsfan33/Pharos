name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pharos
          POSTGRES_PASSWORD: pharos_local_dev
          POSTGRES_DB: pharos
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U pharos" --health-interval 3s
          --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 3s
          --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4

      # MinIO needs a `server` command, which GitHub service containers can't pass,
      # so run it as a step (same image as docker-compose).
      - name: Start MinIO (S3 WORM)
        run: |
          docker run -d --name minio -p 9010:9000 \
            -e MINIO_ROOT_USER=pharos -e MINIO_ROOT_PASSWORD=pharos_local_dev \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9010/minio/health/ready; then echo "minio ready"; break; fi
            sleep 2
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - name: test
        run: pnpm test
        env:
          PHAROS_ENV: local
          PHAROS_PG_URL: postgres://pharos:pharos_local_dev@localhost:5433/pharos
          PHAROS_REDIS_URL: redis://localhost:6380
          PHAROS_S3_ENDPOINT: http://localhost:9010
          PHAROS_S3_REGION: us-east-1
          PHAROS_S3_BUCKET: pharos-evidence
          PHAROS_S3_ACCESS_KEY: pharos
          PHAROS_S3_SECRET_KEY: pharos_local_dev
          PHAROS_S3_FORCE_PATH_STYLE: "true"

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: python conformance
        working-directory: sdks/python
        run: PYTHONPATH=. python -m pytest tests/ -q
