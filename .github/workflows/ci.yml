name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: eslint (blocking)
        run: pnpm lint
      - name: prettier format check (non-blocking report)
        continue-on-error: true
        run: pnpm format:check
      - name: pnpm audit (non-blocking report)
        continue-on-error: true
        run: pnpm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pharos
          POSTGRES_PASSWORD: pharos_local_dev
          POSTGRES_DB: pharos
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U pharos" --health-interval 3s
          --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 3s
          --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4

      # MinIO needs a `server` command, which GitHub service containers can't pass,
      # so run it as a step (same image as docker-compose).
      - name: Start MinIO (S3 WORM)
        run: |
          docker run -d --name minio -p 9010:9000 \
            -e MINIO_ROOT_USER=pharos -e MINIO_ROOT_PASSWORD=pharos_local_dev \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9010/minio/health/ready; then echo "minio ready"; break; fi
            sleep 2
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - name: test
        run: pnpm exec vitest run --reporter=default --reporter=json --outputFile.json=vitest-report.json
        env:
          PHAROS_ENV: local
          PHAROS_PG_URL: postgres://pharos:pharos_local_dev@localhost:5433/pharos
          PHAROS_REDIS_URL: redis://localhost:6380
          PHAROS_S3_ENDPOINT: http://localhost:9010
          PHAROS_S3_REGION: us-east-1
          PHAROS_S3_BUCKET: pharos-evidence
          PHAROS_S3_ACCESS_KEY: pharos
          PHAROS_S3_SECRET_KEY: pharos_local_dev
          PHAROS_S3_FORCE_PATH_STYLE: "true"
      - name: integration tests must run, not skip
        if: always()
        run: |
          node -e '
            const r = require("./vitest-report.json");
            const skipped = (r.numPendingTests ?? 0) + (r.numTodoTests ?? 0);
            console.log(`passed=${r.numPassedTests} failed=${r.numFailedTests} skipped=${skipped}`);
            if (r.numFailedTests > 0) process.exit(1);
            if (skipped > 0) {
              console.error("Integration tests skipped — the flagship guarantees (durability, seal, causeway, ...) were not exercised. CI provisions Postgres/Redis/MinIO, so skips mean the services were unreachable.");
              process.exit(1);
            }
          '


  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: python conformance
        working-directory: sdks/python
        run: PYTHONPATH=. python -m pytest tests/ -q

  changeset:
    # Any PR that changes a publishable (non-private) package must include a changeset.
    # Add the `no-changeset` label to skip (docs-only / internal-only changes).
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'no-changeset')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: require a changeset for publishable-package changes
        run: |
          git fetch origin '${{ github.event.pull_request.base.ref }}' --depth=1
          pnpm exec changeset status --since="origin/${{ github.event.pull_request.base.ref }}"

  dco:
    # Every commit in a PR must be signed off (git commit -s) per the DCO. See CONTRIBUTING.md.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: DCO sign-off check
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          missing=0
          for c in $(git rev-list "$base".."$head"); do
            if ! git show -s --format=%B "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $(git show -s --format='%h %s' "$c") is missing a Signed-off-by line"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Every commit must be signed off with 'git commit -s'. See CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits are signed off (DCO)."
