name: release
# Publishes the SDKs from signed, versioned artifacts.
#   @getpharos/sdk -> npm  (with provenance)
#   getpharos  -> PyPI (with trusted publishing / OIDC)
#
# Triggers on a version tag (v*), or manually via workflow_dispatch for the first publish.
# Requires (set up by a maintainer — see docs/PUBLISHING.md):
#   - npm org "getpharos"; trusted publisher on @getpharos/sdk -> this repo + release.yml (no secret).
#     (First 0.1.0 publish is done manually by the maintainer; this workflow covers all later tags.)
#   - PyPI pending trusted publisher: project "getpharos" -> this repo + release.yml, environment "pharos".
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm -r typecheck
      - name: build SDK
        run: pnpm --filter @getpharos/sdk build
      # npm trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      - name: upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest && npm --version
      - name: publish @getpharos/sdk to npm (OIDC trusted publishing + provenance)
        working-directory: packages/sdk-ts
        run: npm publish --access public

  pypi-publish:
    runs-on: ubuntu-latest
    environment: pharos # MUST match the environment on the PyPI trusted publisher
    permissions:
      id-token: write # required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: hermetic SDK tests
        working-directory: sdks/python
        run: |
          pip install pytest
          PYTHONPATH=. python -m pytest tests/ -q
      - name: build sdist + wheel
        working-directory: sdks/python
        run: |
          pip install build
          python -m build
      - name: publish getpharos to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist
