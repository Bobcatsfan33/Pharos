name: image
# Builds the Pharos API image on a version tag, pushes to GHCR, signs it with cosign
# (keyless / OIDC), and attaches a syft SBOM (SPDX-JSON) as a signed attestation.
# Verification is documented in deploy/INSTALL.md.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@v5

      - name: compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/pharos-api" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: sigstore/cosign-installer@v3

      - name: cosign sign (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

      - name: generate SBOM (syft, SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: attest SBOM (cosign, keyless)
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}@${{ steps.build.outputs.digest }}"
