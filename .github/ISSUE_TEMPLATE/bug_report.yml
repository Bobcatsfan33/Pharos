name: Bug report
description: Report something that is broken or behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** —
        use the [security policy](../security/policy) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the actual vs expected behavior.
      placeholder: When I submit an action with ..., the verdict ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or a failing test that reproduces the issue.
      placeholder: |
        1. `pnpm infra:up`
        2. `pnpm test -t "..."`
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, commit SHA / release tag.
      placeholder: macOS 14, Node 20.11, pnpm 10.32.1, commit abc1234
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
    validations:
      required: false
