apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharos-api
  labels: { app: pharos-api }
spec:
  replicas: { { .Values.replicaCount } }
  selector:
    matchLabels: { app: pharos-api }
  template:
    metadata:
      labels: { app: pharos-api }
    spec:
      # Multi-AZ: spread replicas across zones.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: pharos-api }
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: { { .Values.image.pullPolicy } }
          ports:
            - containerPort: { { .Values.api.port } }
          envFrom:
            - secretRef: { name: { { .Values.secretName } } }
          env:
            - { name: PHAROS_ENV, value: "{{ .Values.config.env }}" }
            - { name: PHAROS_S3_BUCKET, value: "{{ .Values.config.s3Bucket }}" }
            - { name: PHAROS_S3_REGION, value: "{{ .Values.config.s3Region }}" }
            - { name: PHAROS_S3_FORCE_PATH_STYLE, value: "{{ .Values.config.s3ForcePathStyle }}" }
            - { name: PHAROS_KMS_PROVIDER, value: "{{ .Values.config.kmsProvider }}" }
            - { name: PHAROS_ALLOWED_ORIGINS, value: "{{ .Values.config.allowedOrigins }}" }
          readinessProbe:
            httpGet: { path: /healthz, port: { { .Values.api.port } } }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: { { .Values.api.port } } }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: { { toYaml .Values.resources | nindent 12 } }
---
apiVersion: v1
kind: Service
metadata:
  name: pharos-api
  labels: { app: pharos-api }
spec:
  selector: { app: pharos-api }
  ports:
    - port: 80
      targetPort: { { .Values.api.port } }
